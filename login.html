<style>
        body {

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .animate-fade-in-up {
            animation: fadeInUp 0.5s ease-out forwards;
        }
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }
        .delay-4 { animation-delay: 0.4s; }

        /* Background Animations */
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
        .bg-pattern {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .geometric-shape {
            position: absolute;
            background-color: currentColor;
            opacity: 0.04; /* Lowered opacity for more subtle effect when many shapes exist */
            animation: float 15s infinite ease-in-out;
            transition: transform 0.1s ease-out; /* Smooth transition for parallax */
        }
        /* Triangle shape using clip-path */
        .shape-triangle {
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
        }
    </style>

<script>
        // Parallax logic for background shapes
        document.addEventListener('mousemove', function(e) {
            const layers = document.querySelectorAll('.parallax-layer');
            const mouseX = e.clientX;
            const mouseY = e.clientY;

            layers.forEach(layer => {
                const depth = parseFloat(layer.getAttribute('data-depth'));
                const moveX = (mouseX - window.innerWidth / 2) * depth;
                const moveY = (mouseY - window.innerHeight / 2) * depth;
                
                // We maintain the original layout positioning and apply a transform for movement
                // Note: The float animation uses translateY, so we combine the movement
                // Actually, to avoid conflicts with @keyframes float which uses translateY, 
                // we only apply X and Y here. The keyframe might still jitter if it targets the same property.
                // However, Tailwind's transition-transform and our inline style usually works okay for subtle effect.
                layer.style.transform = `translate(${moveX}px, ${moveY}px)`;
            });
        });
    </script>
